- id: bathroom_switch_on
  alias: Bathroom Switch - On
  mode: single
  use_blueprint:
    path: soffes/event_scene.yaml
    input:
      event: event.bathroom_switch_up
      scene: scene.bathroom_bright

- id: bathroom_switch_off
  alias: Bathroom Switch - Off
  mode: single
  use_blueprint:
    path: soffes/event_scene.yaml
    input:
      event: event.bathroom_switch_down
      scene: scene.bathroom_off

- id: bathroom_switch_config
  alias: Bathroom Switch - Config
  mode: single
  trigger:
    - trigger: state
      entity_id: event.bathroom_switch_config
      not_from: "unavailable"
  action:
    - action: scene.turn_on
      target:
        entity_id: scene.bathroom_vanity_dim

- id: bathroom_vanity_switch_on
  alias: Bathroom Vanity Switch - On
  mode: single
  use_blueprint:
    path: soffes/event_scene.yaml
    input:
      event: event.bathroom_vanity_switch_up
      scene: scene.bathroom_vanity_bright

- id: bathroom_vanity_switch_off
  alias: Bathroom Vanity Switch - Off
  mode: single
  use_blueprint:
    path: soffes/event_scene.yaml
    input:
      event: event.bathroom_vanity_switch_down
      scene: scene.bathroom_vanity_off

- id: bathroom_vanity_switch_config
  alias: Bathroom Vanity Switch - Config
  mode: single
  trigger:
    - trigger: state
      entity_id: event.bathroom_vanity_switch_config
      not_from: "unavailable"
  action:
    - action: scene.turn_on
      target:
        entity_id: scene.bathroom_vanity_dim
