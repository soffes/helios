- id: garage_switch_on
  alias: Garage Switch - On
  mode: single
  use_blueprint:
    path: soffes/event_scene.yaml
    input:
      event: event.garage_switch_up
      scene: scene.garage_bright

- id: garage_switch_off
  alias: Garage Switch - Off
  mode: single
  use_blueprint:
    path: soffes/event_scene.yaml
    input:
      event: event.garage_switch_down
      scene: scene.garage_off

- id: laundry_door_sensor
  alias: Laundry Door Sensor
  mode: single
  use_blueprint:
    path: soffes/binary_sensor_scene.yaml
    input:
      binary_sensor: binary_sensor.laundry_door
      on_scene: scene.laundry_door_open
      off_scene: scene.laundry_door_closed

- id: back_door_sensor
  alias: Back Door Sensor
  mode: single
  use_blueprint:
    path: soffes/binary_sensor_scene.yaml
    input:
      binary_sensor: binary_sensor.back_door
      on_scene: scene.back_door_open
      off_scene: scene.back_door_closed
      off_delay: 60 # seconds
